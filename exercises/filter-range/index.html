<script>
function filterRange(array, a, b) {
    return array
        .filter((num) => (num >= a) && (num <= b));
  }

const toFilter = [1, 3, 4, 5, 7];
let filteredArr = filterRange(toFilter);
console.log(filteredArr);

</script>
